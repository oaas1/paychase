<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main-project/create-invoice.css">
    <title>Document</title>
</head>
<body>
    <div class="form-body">
        

        <div class="invoice-form">
            <div class="invoice-header">
                <h1>Create New Invoice</h1>
                <div class="close">✕</div>
            </div>
            
            
            <form id="invoiceForm">
                <div class="form-group">
                    <label for="clientName">Client Name</label>
                  <input type="text" id="clientName" placeholder="Client Name">  
                </div>

                <div class="form-group">
                    <label for="clientPhone">Client Phone</label>
                  <input type="number" id="clientPhone" placeholder="09048323255">  
                </div>

                <div class="form-group">

                    <label for="clientEmail">Client Email</label>
                    <input type="email" id="clientEmail" placeholder="Client Email">
                </div>
                <div class="form-group">

                    <label for="amount">Amount (&#8358;)</label>
                    <input type="number" id="amount" placeholder="e.g 1000 or 1000.00">
                </div>

                <div class="form-group">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate">
                </div>
                
                <div>
                    <button type="submit" onclick="createInvoice()">Create Invoice</button>
                    <a href="main-page.html">Cancel</a>
                </div>

            </form>
            
        </div>
    </div>
    
    
</body>

<script src="/main-project/create-invoice.js"></script>
</html>
